# Server
server.port=8080
spring.application.name=sevalink-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/sevalink_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=sevalink
spring.datasource.password=SevaLink@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
